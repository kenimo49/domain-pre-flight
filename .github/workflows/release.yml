name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package metadata
        run: twine check dist/*

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF##*/}" dist/* --clobber

      # PyPI publishing is opt-in via repo secret. If `PYPI_API_TOKEN` is not
      # set, this step is skipped (the conditional checks for the secret name
      # via the env-var indirection that GitHub Actions allows).
      - name: Publish to PyPI (if token configured)
        if: env.PYPI_API_TOKEN != ''
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload \
            --username __token__ \
            --password "$PYPI_API_TOKEN" \
            dist/*
